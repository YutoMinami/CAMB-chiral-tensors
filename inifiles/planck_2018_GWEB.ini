# Parameters for CAMB-chiral-tensors
# Based on the Planck 2018 LCDM best-fit example and extended with
# primordial chiral tensor parameters that source EB/TB.

output_root = planck_2018_GWEB

get_scalar_cls = T
get_vector_cls = F
get_tensor_cls = T
get_transfer   = T

do_lensing     = T
do_nonlinear   = 3

# Enable primordial parity-violating tensor spectra and the extended
# tensor integration used for EB/TB.
tensor_PV = T
tensor_highl = T

# Chiral tensor parameters
r_vac = 1e-1
r_ast = 1e0
sig = 5e-1
kp = 5e-2
calP_zeta = 2.1e-9

l_max_scalar      = 2700
k_eta_max_scalar  = 18000
l_max_tensor      = 1500
k_eta_max_tensor  = 3000

ombh2          = 0.0223828
omch2          = 0.1201075
omnuh2         = 0.6451439E-03
omk            = 0
hubble         = 67.32117

dark_energy_model  = ppf
w              = -1
cs2_lam        = 1

temp_cmb           = 2.7255
helium_fraction    = 0.2454006
massless_neutrinos = 2.046
nu_mass_eigenstates = 1
massive_neutrinos  = 1
share_delta_neff = T
nu_mass_fractions = 1

initial_power_num         = 1
pivot_scalar              = 0.05
pivot_tensor              = 0.05
scalar_amp                = 2.100549e-9
scalar_spectral_index     = 0.9660499
scalar_nrun               = 0
scalar_nrunrun            = 0
tensor_spectral_index     = 0
tensor_nrun               = 0
tensor_parameterization   = 1
initial_ratio             = 1

reionization         = T
re_use_optical_depth = T
re_optical_depth     = 0.05430842
re_redshift          = 11
re_delta_redshift    = 0.5
re_ionization_frac   = -1
re_helium_redshift = 3.5
re_helium_delta_redshift = 0.5

recombination_model = Recfast
RECFAST_fudge = 1.14
RECFAST_fudge_He = 0.86
RECFAST_Heswitch = 6
RECFAST_Hswitch  = T

initial_condition   = 1
initial_vector = -1 0 0 0 0
vector_mode = 0

COBE_normalize = F
CMB_outputscale = 7.42835025e12

transfer_high_precision = T
transfer_kmax           = 2
transfer_k_per_logint   = 0
transfer_num_redshifts  = 1
transfer_interp_matterpower = T
transfer_redshift(1)    = 0
transfer_filename(1)    = transfer_out.dat
transfer_matterpower(1) = matterpower.dat
transfer_power_var = 7

scalar_output_file = scalCls.dat
vector_output_file = vecCls.dat
tensor_output_file = tensCls.dat
total_output_file  = totCls.dat
lensed_output_file = lensedCls.dat
lensed_total_output_file = lensedtotCls.dat
lens_potential_output_file = lenspotentialCls.dat
FITS_filename      = scalCls.fits
